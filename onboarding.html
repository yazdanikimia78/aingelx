<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tell Us About Your Business — Aingelx</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: rgba(255,255,255,0.08);
      --text: #f0f0f5; --muted: #888899; --accent: #6366f1; --accent2: #8b5cf6;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    nav { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
    .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px; max-width: 600px; width: 100%; }
    .step-badge { display: inline-block; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #a5b4fc; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 12px; border-radius: 20px; margin-bottom: 20px; }
    h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 10px; }
    .subtitle { color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 36px; }
    .form-group { margin-bottom: 22px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    label .hint { font-weight: 400; color: var(--muted); margin-left: 4px; }
    input, textarea, select { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.95rem; padding: 13px 16px; outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus, select:focus { border-color: rgba(99,102,241,0.6); }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.2); }
    select option { background: #1a1a2e; }
    textarea { resize: vertical; min-height: 110px; }
    .submit-btn { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; color: #fff; font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 600; padding: 15px; cursor: pointer; margin-top: 8px; transition: opacity 0.2s, transform 0.1s; }
    .submit-btn:hover { opacity: 0.92; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .trust-row { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
    .trust-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--muted); }
    .trust-item svg { width: 14px; height: 14px; stroke: #6366f1; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    @media (max-width: 600px) { .card { padding: 28px 20px; } h1 { font-size: 1.5rem; } }
  </style>
</head>
<body>
  <nav><a href="/" class="logo">Aingelx</a></nav>
  <main>
    <div class="card">
      <div class="step-badge">Step 1 of 2 — Your details</div>
      <h1>Tell us about your business</h1>
      <p class="subtitle">Takes 2 minutes. We'll send you a secure payment link and get started right away.</p>

      <form id="intake-form" name="intake" method="POST" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="intake" />
        <p style="display:none"><input name="bot-field" /></p>

        <div class="form-group">
          <label for="name">Your name</label>
          <input type="text" id="name" name="name" placeholder="Jane Smith" required />
        </div>

        <div class="form-group">
          <label for="email">Email address <span class="hint">— we'll send your payment link here</span></label>
          <input type="email" id="email" name="email" placeholder="jane@yourbusiness.com" required />
        </div>

        <div class="form-group">
          <label for="plan">Your plan</label>
          <select id="plan" name="plan" required>
            <option value="" disabled selected>Select your plan</option>
            <option value="starter">Starter — $97 one-time</option>
            <option value="dfy">Done For You — $297 one-time</option>
            <option value="retainer">Monthly Retainer — $197/mo</option>
          </select>
        </div>

        <div class="form-group">
          <label for="business">What does your business do?</label>
          <textarea id="business" name="business" placeholder="e.g. I run a dental practice in Austin and want to follow up with patients who inquire about teeth whitening." required></textarea>
        </div>

        <div class="form-group">
          <label for="target">Who is your target customer? <span class="hint">— be specific</span></label>
          <textarea id="target" name="target" placeholder="e.g. Local residents aged 25–45 who searched for cosmetic dental services online." style="min-height:80px;"></textarea>
        </div>

        <div class="form-group">
          <label for="outcome">What outcome do you deliver for them?</label>
          <textarea id="outcome" name="outcome" placeholder="e.g. A brighter smile in one visit, boosting confidence before big events." style="min-height:80px;"></textarea>
        </div>

        <div class="form-group">
          <label for="tool">What email tool do you use? <span class="hint">optional</span></label>
          <input type="text" id="tool" name="tool" placeholder="e.g. Gmail, Mailchimp, HubSpot, ActiveCampaign…" />
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">Continue to Payment →</button>

        <div class="trust-row">
          <div class="trust-item">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Info kept confidential
          </div>
          <div class="trust-item">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Secure Stripe checkout
          </div>
          <div class="trust-item">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Delivery within 24–48h
          </div>
        </div>
      </form>
    </div>
  </main>

  <script>
    const STRIPE_LINKS = {
      starter: 'https://buy.stripe.com/7sY4gB2YaeUvcYr5LNcEw00',
      dfy:     'https://buy.stripe.com/28E6oJ7eq3bNf6zgqrcEw01',
      retainer:'https://buy.stripe.com/eVq9AVbuG6nZ0bFb67cEw02'
    };

    // Pre-select plan from URL param
    const params = new URLSearchParams(window.location.search);
    const planParam = params.get('plan');
    const planSelect = document.getElementById('plan');
    if (planParam && STRIPE_LINKS[planParam]) planSelect.value = planParam;

    const form = document.getElementById('intake-form');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';

      const formData = new FormData(form);
      const plan = formData.get('plan');
      const stripeUrl = STRIPE_LINKS[plan];

      if (!stripeUrl) {
        alert('Please select a plan.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Continue to Payment →';
        return;
      }

      try {
        // Save to Netlify Forms
        await fetch('/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(formData).toString()
        });

        // Notify via email (fire and forget)
        fetch('/.netlify/functions/send-lead', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(Object.fromEntries(formData))
        });

        // Redirect to Stripe
        window.location.href = stripeUrl;
      } catch (err) {
        // Even if email fails, still redirect to payment
        window.location.href = stripeUrl;
      }
    });
  </script>
</body>
</html>
